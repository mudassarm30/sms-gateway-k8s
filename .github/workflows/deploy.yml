name: Build and Deploy

on:
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v3

      # Check out the other repositories using GH_PAT for private access
      - name: Checkout backend repo
        uses: actions/checkout@v3
        with:
          repository: avais/sms-gateway-backend
          path: sms-gateway-backend
          token: ${{ secrets.GH_PAT }}

      - name: Checkout worker repo
        uses: actions/checkout@v3
        with:
          repository: mudassarm30/sms-gateway-worker
          path: sms-gateway-worker
          token: ${{ secrets.GH_PAT }}

      - name: Checkout frontend repo
        uses: actions/checkout@v3
        with:
          repository: avais/sms-gateway-frontend
          path: sms-gateway-frontend
          token: ${{ secrets.GH_PAT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./sms-gateway-backend
          file: ./sms-gateway-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-backend:latest

      # Build Worker
      - name: Build and push Worker
        uses: docker/build-push-action@v4
        with:
          context: ./sms-gateway-worker
          file: ./sms-gateway-worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-worker:latest

      # Build Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./sms-gateway-frontend
          file: ./sms-gateway-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v3

      - name: Deploy to Ubuntu K8s Cluster
        uses: appleboy/ssh-action@v0.1.10
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,GH_PAT
          script: |
            mkdir -p ~/deployments
            cd ~/deployments
            
            # Clone or update the deployment repository using PAT for access
            if [ ! -d "sms-gateway-k8s" ]; then
              git clone https://x-access-token:${GH_PAT}@github.com/mudassarm30/sms-gateway-k8s.git
            else
              cd sms-gateway-k8s
              git pull https://x-access-token:${GH_PAT}@github.com/mudassarm30/sms-gateway-k8s.git
              cd ..
            fi
            
            cd sms-gateway-k8s
            
            # Apply Namespace
            kubectl apply -f k8s/namespace.yaml
            
            # Dynamically create/update the database credentials Secret
            kubectl create secret generic db-credentials \
              --from-literal=POSTGRES_USER=$POSTGRES_USER \
              --from-literal=POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
              --from-literal=POSTGRES_DB=$POSTGRES_DB \
              -n sms-gateway \
              --dry-run=client -o yaml | kubectl apply -f -
              
            # Apply all Kubernetes manifests
            kubectl apply -f k8s/
            
            # Force restart deployments to pull latest images
            kubectl rollout restart deployment sms-gateway-backend -n sms-gateway
            kubectl rollout restart deployment sms-gateway-worker -n sms-gateway
            kubectl rollout restart deployment sms-gateway-frontend -n sms-gateway
