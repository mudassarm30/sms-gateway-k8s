name: Build and Deploy

on:
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v3

      # Check out the other repositories
      # Note: Adjust the repository URLs and paths according to your actual GitHub setup
      - name: Checkout backend repo
        uses: actions/checkout@v3
        with:
          repository: avais/sms-gateway-backend
          path: sms-gateway-backend
          token: ${{ secrets.GITHUB_TOKEN }} # Adjust if private

      - name: Checkout worker repo
        uses: actions/checkout@v3
        with:
          repository: mudassarm30/sms-gateway-worker
          path: sms-gateway-worker
          token: ${{ secrets.GITHUB_TOKEN }} # Adjust if private

      - name: Checkout frontend repo
        uses: actions/checkout@v3
        with:
          repository: avais/sms-gateway-frontend
          path: sms-gateway-frontend
          token: ${{ secrets.GITHUB_TOKEN }} # Adjust if private

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./sms-gateway-backend
          file: ./sms-gateway-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-backend:latest

      # Build Worker
      - name: Build and push Worker
        uses: docker/build-push-action@v4
          # Note: The worker Dockerfile assumes it builds itself with Maven
        with:
          context: ./sms-gateway-worker
          file: ./sms-gateway-worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-worker:latest

      # Build Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./sms-gateway-frontend
          file: ./sms-gateway-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-gateway-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v3

      - name: Deploy to Ubuntu K8s Cluster
        uses: appleboy/ssh-action@v0.1.10
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            # We copy the k8s folder to the remote server or just run kubectl if remote is configured.
            # Assuming kubectl is configured on the target machine:
            mkdir -p ~/deployments/sms-gateway-k8s
            cd ~/deployments/sms-gateway-k8s
            # For simplicity, we can clone this repo directly on the remote machine
            # or apply remote files. Since this is SSH, let's write a command to apply directly
            # from the repository URL, or we can use scp. 
            # A common approach is pulling the latest yaml directly:
            git clone https://github.com/your-org-or-user/sms-gateway-k8s.git temp-repo || (cd temp-repo && git pull)
            kubectl apply -f temp-repo/k8s/namespace.yaml
            
            # Dynamically create the database credentials Secret from GitHub Secrets
            kubectl create secret generic db-credentials \
              --from-literal=POSTGRES_USER=$POSTGRES_USER \
              --from-literal=POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
              --from-literal=POSTGRES_DB=$POSTGRES_DB \
              -n sms-gateway \
              --dry-run=client -o yaml | kubectl apply -f -
              
            kubectl apply -f temp-repo/k8s/
            kubectl rollout restart deployment sms-gateway-backend -n sms-gateway
            kubectl rollout restart deployment sms-gateway-worker -n sms-gateway
            kubectl rollout restart deployment sms-gateway-frontend -n sms-gateway
